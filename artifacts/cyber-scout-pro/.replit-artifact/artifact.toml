kind = "web"
previewPath = "/"
title = "Cyber Scout Pro"
version = "1.0.0"
id = "artifacts/cyber-scout-pro"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21663

[services.development]
run = "pnpm --filter @workspace/cyber-scout-pro run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cyber-scout-pro", "run", "build" ]
publicDir = "artifacts/cyber-scout-pro/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21663"
BASE_PATH = "/"
